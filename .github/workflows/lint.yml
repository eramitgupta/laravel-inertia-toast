name: Lint Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  style:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Ensure branch is up-to-date with main
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor origin/main HEAD; then
            echo "❌ This branch is not up to date with main."
            exit 1
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, bcmath
          tools: composer:v2

      - name: Install Dependencies
        run: composer install --no-scripts --no-interaction --prefer-dist

      - name: Check code style with Pint
        run: vendor/bin/pint --test

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vue/package-lock.json

      - name: Install Vue package dependencies
        working-directory: vue
        run: npm ci

      - name: Check Vue package formatting
        working-directory: vue
        run: npm run lint:check

      - name: Add Lint Results as PR Comment
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `
            ## ⚠️ Lint Check Failed

            Please fix the PHP or Vue package lint issues before merging.
            Run \`vendor/bin/pint --test\` in the package root and \`npm run lint:check\` in \`vue/\` locally.

            For more information about Laravel Pint, visit: https://laravel.com/docs/pint
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
