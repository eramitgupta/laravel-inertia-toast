name: Lint Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  style:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Ensure branch is up-to-date with main
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor origin/main HEAD; then
            echo "❌ This branch is not up to date with main."
            exit 1
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, bcmath
          tools: composer:v2

      - name: Install Dependencies
        run: composer install --no-scripts --no-interaction --prefer-dist

      - name: Check code style with Pint
        run: vendor/bin/pint --test

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            vue/package-lock.json
            react/package-lock.json

      - name: Install Vue package dependencies
        working-directory: vue
        run: npm install --ignore-scripts

      - name: Check Vue package formatting
        working-directory: vue
        run: npm run lint:check

      - name: Install React package dependencies
        working-directory: react
        run: npm install --ignore-scripts

      - name: Check React package formatting
        working-directory: react
        run: npm run lint:check
